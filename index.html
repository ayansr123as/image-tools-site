<!DOCTYPE html>
<html>
<head>
  <title>Smart Image Tools</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .tool { display: none; margin-top: 20px; }
    button { margin: 5px; padding: 10px; }
  </style>
</head>

<body>

<h1>Smart Image Tools</h1>

<!-- TOOL MENU -->
<button onclick="showTool('resize')">Resize</button>
<button onclick="showTool('convert')">JPG → PNG</button>

<!-- RESIZE TOOL -->
<div id="resize" class="tool">
  <h2>Image Resizer</h2>
  <input type="file" id="upload"><br><br>
  Width: <input type="number" id="width"><br>
  Height: <input type="number" id="height"><br><br>
  <button onclick="resizeImage()">Resize</button><br><br>
  <canvas id="canvas"></canvas><br><br>
  <a id="download" download="image.png">Download</a>
</div>

<!-- CONVERT TOOL -->
<div id="convert" class="tool">
  <h2>JPG → PNG</h2>
  <input type="file" id="convertUpload"><br><br>
  <button onclick="convertImage()">Convert</button><br><br>
  <canvas id="convertCanvas"></canvas><br><br>
  <a id="convertDownload" download="converted.png">Download</a>
</div>

<script>
function showTool(toolId) {
  document.querySelectorAll('.tool').forEach(t => t.style.display = 'none');
  document.getElementById(toolId).style.display = 'block';
}

function resizeImage() {
  const file = document.getElementById('upload').files[0];
  const width = document.getElementById('width').value;
  const height = document.getElementById('height').value;

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);

      document.getElementById('download').href = canvas.toDataURL();
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
}

function convertImage() {
  const file = document.getElementById('convertUpload').files[0];

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById('convertCanvas');
      const ctx = canvas.getContext('2d');

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img, 0, 0);

      document.getElementById('convertDownload').href = canvas.toDataURL("image/png");
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
}
</script>

</body>
</html>
